<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HLS Overview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    .top {
      width: min(1100px, 100%);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 1.2rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #a3a3a3;
      margin: 0;
      letter-spacing: 0.05em;
    }
    .sub {
      font-size: 0.875rem;
      color: #737373;
      margin: 0;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      gap: 0.4rem;
      align-items: center;
      padding: 0.25rem 0.5rem;
      border: 1px solid #262626;
      border-radius: 999px;
      background: rgba(255,255,255,0.03);
      color: #a3a3a3;
      font-size: 0.8rem;
    }
    .grid {
      width: min(1100px, 100%);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }
    .card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #262626;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #262626;
      display: block;
    }
    .info {
      padding: 0.55rem 0.75rem;
      font-size: 0.8125rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.75rem;
    }
    .id { font-weight: 600; color: #e5e5e5; }
    .status {
      font-size: 0.75rem;
      white-space: nowrap;
    }
    .ok { color: #22c55e; }
    .fail { color: #ef4444; }
    .pending { color: #a3a3a3; }
    .links {
      padding: 0 0.75rem 0.75rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .btn {
      appearance: none;
      border: 1px solid #303030;
      background: #151515;
      color: #e5e5e5;
      padding: 0.35rem 0.55rem;
      border-radius: 7px;
      font-size: 0.78rem;
      text-decoration: none;
      line-height: 1;
    }
    .btn:hover { background: #202020; border-color: #404040; }
  </style>
</head>
<body>
  <div class="top">
    <h1>HLS Overview</h1>
    <p class="sub">
      <span class="pill">썸네일: <code>/live/thumb/tableNN_01.jpg</code></span>
      <span class="pill">플레이어: <code>/live/player.html?stream=tableNN_01</code></span>
      <span class="pill" id="summary">로딩 중…</span>
    </p>
  </div>
  <ul class="grid" id="grid"></ul>

  <script>
    var THUMB_BASE = location.origin + '/live/thumb';
    var PLAYER_BASE = location.origin + '/live/player.html?stream=';
    var LIVE_BASE = location.origin + '/live/';
    /** RTMP/SRS 라이브 테이블 수 (table01_01 … tableNN_01) */
    var TABLE_COUNT = 18;

    function tableId(n) {
      var nn = String(n).padStart(2, '0');
      return 'table' + nn + '_01';
    }

    function buildList() {
      var ids = [];
      for (var i = 1; i <= TABLE_COUNT; i += 1) ids.push(tableId(i));
      return ids;
    }

    function render(ids, okSet) {
      var grid = document.getElementById('grid');
      var summaryEl = document.getElementById('summary');
      var okCount = 0;

      grid.innerHTML = '';

      ids.forEach(function (id) {
        var li = document.createElement('li');
        li.className = 'card';

        var img = document.createElement('img');
        img.className = 'thumb';
        img.alt = id;
        img.dataset.status = 'pending';
        img.src = THUMB_BASE + '/' + id + '.jpg?t=' + Date.now();

        var status = document.createElement('span');
        status.className = 'status pending';
        status.textContent = '…';

        img.onload = function () {
          img.dataset.status = 'ok';
          status.textContent = 'OK';
          status.className = 'status ok';
          okCount += 1;
          summaryEl.textContent = '총 ' + TABLE_COUNT + '개 · OK ' + okCount + ' / FAIL ' + (TABLE_COUNT - okCount);
        };
        img.onerror = function () {
          img.dataset.status = 'fail';
          img.removeAttribute('src');
          status.textContent = 'FAIL';
          status.className = 'status fail';
          summaryEl.textContent = '총 ' + TABLE_COUNT + '개 · OK ' + okCount + ' / FAIL ' + (TABLE_COUNT - okCount);
        };

        var info = document.createElement('div');
        info.className = 'info';

        var idEl = document.createElement('span');
        idEl.className = 'id';
        idEl.textContent = id.replace('table', 'Table ').replace('_01', '');

        info.appendChild(idEl);
        info.appendChild(status);

        var links = document.createElement('div');
        links.className = 'links';

        var a1 = document.createElement('a');
        a1.className = 'btn';
        a1.href = PLAYER_BASE + id;
        a1.target = '_blank';
        a1.rel = 'noopener noreferrer';
        a1.textContent = 'Player';

        var a2 = document.createElement('a');
        a2.className = 'btn';
        a2.href = LIVE_BASE + id + '.m3u8';
        a2.target = '_blank';
        a2.rel = 'noopener noreferrer';
        a2.textContent = 'm3u8';

        links.appendChild(a1);
        links.appendChild(a2);

        li.appendChild(img);
        li.appendChild(info);
        li.appendChild(links);
        grid.appendChild(li);
      });

      var initialOk = okSet ? okSet.size : 0;
      summaryEl.textContent = '총 ' + TABLE_COUNT + '개 · OK ' + initialOk + ' / FAIL ' + (TABLE_COUNT - initialOk) + ' (로딩 결과로 갱신됨)';
    }

    // thumb-list.json이 있으면 "현재 생성된 thumb" 참고 (그래도 TABLE_COUNT개는 모두 렌더)
    fetch(location.origin + '/live/thumb/thumb-list.json?t=' + Date.now())
      .then(function (r) { return r.ok ? r.json() : []; })
      .catch(function () { return []; })
      .then(function (arr) {
        var okSet = new Set(Array.isArray(arr) ? arr : []);
        render(buildList(), okSet);
      });
  </script>
</body>
</html>
