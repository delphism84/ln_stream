<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HLS sync player</title>
  <style>
    :root { --bg:#0d0f12; --fg:#e8eaed; --muted:#9aa0a6; --accent:#3b82f6; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; background:var(--bg); color:var(--fg); font:14px/1.45 system-ui, sans-serif; }
    .wrap { display:flex; flex-direction:column; height:100%; max-width:960px; margin:0 auto; padding:8px; }
    video { width:100%; aspect-ratio:16/9; background:#000; border-radius:6px; }
    .bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-top:8px; font-size:12px; color:var(--muted); }
    .bar strong { color:var(--fg); }
    .pill { background:#1a1d23; padding:4px 8px; border-radius:4px; }
    button { background:#1e293b; border:1px solid #334155; color:var(--fg); padding:6px 12px; border-radius:4px; cursor:pointer; }
    button:hover { border-color:var(--accent); }
    .err { color:#f87171; margin-top:6px; font-size:12px; min-height:1.2em; }
  </style>
</head>
<body>
  <!--
    임베드 예:
    <iframe src="https://stream.example.com/llhls/hlsplayer.html?stream=table01_01&profile=ll"
            allowfullscreen style="border:0;width:100%;max-width:960px;height:540px"></iframe>
    파라미터:
      stream   스트림명(.m3u8 제외), 예: table01_01
      profile  ll = /llhls/live/ (저지연 프로필 동일 TS), std = /live/
      syncSegs 라이브 엣지 대비 뒤로 둘 세그먼트 수(1초 TS면 1=약1초 여유), 기본 1
      targetMs 목표 지연(ms), 기본 1000 — 라이브엣지+1초 유사
      muted    0이면 음성 켜기(자동재생 실패할 수 있음), 기본=muted 자동재생
      signal   1=WebSocket 시그널+합성PDT 동기(기본), 0=끔
      wsUrl    시그널 전용 URL (기본: wss?://호스트/sync/ws)
  -->
  <div class="wrap">
    <video id="v" playsinline webkit-playsinline muted autoplay controls></video>
    <div class="bar">
      <span class="pill">프로필 <strong id="profLbl">—</strong></span>
      <span class="pill">스트림 <strong id="streamLbl">—</strong></span>
      <span class="pill">시그널 <strong id="sigLbl">—</strong></span>
      <span class="pill">추정 지연 <strong id="latLbl">—</strong></span>
      <span class="pill">목표 지연 <strong id="tgtLbl">—</strong></span>
      <span class="pill">PDT(playhead) <strong id="pdtLbl">—</strong></span>
      <button type="button" id="btnLive">라이브엣지−1초로 맞춤</button>
    </div>
    <div class="err" id="err"></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js" crossorigin="anonymous"></script>
  <script>
(function () {
  var params = new URLSearchParams(location.search);
  var stream = (params.get('stream') || 'table01_01').replace(/\.m3u8$/i, '');
  var profile = (params.get('profile') || 'll').toLowerCase();
  var syncSegs = Math.max(1, Math.min(12, parseInt(params.get('syncSegs') || '1', 10) || 1));
  var targetMs = Math.max(500, Math.min(20000, parseInt(params.get('targetMs') || '1000', 10) || 1000));
  var unmuted = params.get('muted') === '0';
  var useSignal = params.get('signal') !== '0';

  var origin = location.origin;
  var basePath = profile === 'std' ? '/live' : '/llhls/live';
  var src = origin + basePath + '/' + encodeURIComponent(stream) + '.m3u8';
  var wsOverride = params.get('wsUrl');
  var wsBuilt = (function () {
    if (wsOverride) return wsOverride;
    var u = new URL(origin);
    u.protocol = u.protocol === 'https:' ? 'wss:' : 'ws:';
    u.pathname = '/sync/ws';
    u.search = '';
    u.hash = '';
    return u.toString();
  })();

  var video = document.getElementById('v');
  var errEl = document.getElementById('err');
  var hls = null;
  var syncTimer = null;
  var ws = null;
  var lastTick = null;
  var lastSeekAt = 0;

  document.getElementById('profLbl').textContent = profile === 'std' ? 'std (/live)' : 'll (/llhls/live)';
  document.getElementById('streamLbl').textContent = stream;
  document.getElementById('tgtLbl').textContent = (targetMs / 1000).toFixed(1) + 's · syncSegs=' + syncSegs;
  document.getElementById('sigLbl').textContent = useSignal ? '연결 중…' : 'off';

  if (unmuted) {
    video.muted = false;
  }

  function post(payload) {
    try {
      if (window.parent && window.parent !== window) {
        window.parent.postMessage(Object.assign({ t: 'hlsplayer', stream: stream, profile: profile }, payload), '*');
      }
    } catch (e) {}
  }

  function estimateLatency() {
    if (!hls) return null;
    if (typeof hls.latency === 'number' && !isNaN(hls.latency)) return hls.latency;
    var d = hls.levels && hls.levels[hls.currentLevel] && hls.levels[hls.currentLevel].details;
    if (!d || !d.live || !d.edge) return null;
    return d.edge - video.currentTime;
  }

  function applySyncLoop() {
    if (syncTimer) clearInterval(syncTimer);
    syncTimer = setInterval(function () {
      if (!hls || !video) return;
      var lat = estimateLatency();
      var el = document.getElementById('latLbl');
      if (lat != null) el.textContent = lat.toFixed(2) + 's';
      else el.textContent = '—';

      post({ latency: lat, targetMs: targetMs, tick: lastTick });

      if (useSignal && ws && ws.readyState === 1) return;
      if (video.readyState < 2) return;
      if (lat == null) return;
      var delta = lat * 1000 - targetMs;
      if (delta > 200) video.playbackRate = Math.min(1.12, video.playbackRate + 0.02);
      else if (delta < -200) video.playbackRate = Math.max(0.94, video.playbackRate - 0.02);
      else if (Math.abs(delta) < 120) {
        if (Math.abs(video.playbackRate - 1) > 0.01) video.playbackRate = 1;
      }
    }, 500);
  }

  function seekToTargetSn(targetSn) {
    if (!hls || !video) return;
    var det = hls.levels && hls.levels[hls.currentLevel] && hls.levels[hls.currentLevel].details;
    if (!det || !det.fragments || !det.fragments.length) return;
    var frag = det.fragments.filter(function (f) { return f.sn === targetSn; })[0];
    if (!frag || typeof frag.start !== 'number') return;
    var playing = det.fragments.filter(function (f) {
      return video.currentTime >= f.start && video.currentTime < f.start + (f.duration || 0) + 0.05;
    })[0];
    var drift = playing ? playing.sn - targetSn : 99;
    if (drift === 0) return;
    if (Date.now() - lastSeekAt < 1500) return;
    lastSeekAt = Date.now();
    video.currentTime = frag.start + 0.04;
  }

  function connectSignal() {
    if (!useSignal || !window.WebSocket) return;
    try {
      ws = new WebSocket(wsBuilt);
    } catch (e) {
      document.getElementById('sigLbl').textContent = '실패';
      return;
    }
    ws.onopen = function () {
      document.getElementById('sigLbl').textContent = '구독';
      ws.send(JSON.stringify({ op: 'sub', stream: stream, syncSegs: syncSegs }));
    };
    ws.onmessage = function (ev) {
      var msg;
      try {
        msg = JSON.parse(ev.data);
      } catch (e) {
        return;
      }
      if (msg.op === 'tick') {
        lastTick = msg;
        if (typeof msg.playheadPdtMs === 'number') {
          var d = new Date(msg.playheadPdtMs);
          document.getElementById('pdtLbl').textContent = d.toISOString().substr(11, 12) + 'Z';
        }
        if (typeof msg.targetSn === 'number' && Hls.isSupported()) {
          seekToTargetSn(msg.targetSn);
        }
        post({ signal: msg });
      } else if (msg.op === 'subscribed') {
        document.getElementById('sigLbl').textContent = 'ok';
      }
    };
    ws.onerror = function () {
      document.getElementById('sigLbl').textContent = 'err';
    };
    ws.onclose = function () {
      document.getElementById('sigLbl').textContent = '끊김';
      lastTick = null;
      if (useSignal) setTimeout(connectSignal, 2000);
    };
  }

  function start() {
    errEl.textContent = '';
    if (Hls.isSupported()) {
      hls = new Hls({
        lowLatencyMode: false,
        liveSyncDurationCount: syncSegs,
        liveMaxLatencyDurationCount: Math.max(3, syncSegs + 3),
        maxBufferLength: 14,
        maxMaxBufferLength: 32,
        liveDurationInfinity: true,
        maxLiveSyncPlaybackRate: 1.12,
        startPosition: -1
      });
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function () {
        video.muted = !unmuted;
        video.play().catch(function () {});
      });
      hls.on(Hls.Events.ERROR, function (_, data) {
        if (data.fatal) {
          errEl.textContent = (data.type || '') + ' ' + (data.details || '');
          post({ error: String(data.details || data.type) });
        }
      });
      applySyncLoop();
      connectSignal();
      return;
    }
    if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.muted = !unmuted;
      video.addEventListener('loadedmetadata', function () { video.play().catch(function () {}); });
      errEl.textContent = 'Safari 네이티브 HLS: 시그널 PDT 표시만, SN 시크 제한';
      if (useSignal) connectSignal();
      return;
    }
    errEl.textContent = 'HLS 재생 불가 브라우저';
  }

  document.getElementById('btnLive').addEventListener('click', function () {
    if (!hls) return;
    var d = hls.levels && hls.levels[hls.currentLevel] && hls.levels[hls.currentLevel].details;
    if (d && d.live && typeof d.edge === 'number') {
      video.currentTime = Math.max(0, d.edge - targetMs / 1000);
    } else if (typeof hls.liveSyncPosition === 'number') {
      video.currentTime = Math.max(0, hls.liveSyncPosition - targetMs / 1000);
    }
  });

  start();
})();
  </script>
</body>
</html>
