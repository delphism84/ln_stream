# main config for srs.
# @see full.conf for detail config.

listen              1935;
# 동시 접속(클라이언트) 상한 — 트래픽·리소스에 맞게 조정
max_connections     2000;
srs_log_tank        console;
srs_log_level       error;
# srs_log_file        ./logs/srs.log;
daemon              off;
http_api {
    enabled         on;
    listen          1985;
	https {
		enabled on;
		listen 1990;
		key ./conf/server.key;
		cert ./conf/server.crt;
	}
}
http_server {
    enabled         off;
    listen          8080;
    dir             /var/www/static;
}
rtc_server {
	enabled on;
	listen 8000; # UDP
	candidate *;
}
vhost __defaultVhost__ {
	# 지연보다 안정 우선 (HLS 세그먼트·버퍼 여유)
	min_latency off;
	tcp_nodelay on;
	publish {
		mr off;
		# first packet timeout in ms (increase for slow encoders)
		firstpkt_timeout 600000;
		# normal packet timeout in ms (increase for network issues)
		normal_timeout 600000;
		# parse sps for video resolution info
		parse_sps on;
		# kickoff idle publisher when no players (0 = disabled)
		kickoff_for_idle 0;
	}
    hls {
        enabled         on;
        hls_path        /var/www/static/live/hls;
		# 인코더 GOP/IDR와 불일치 시 TS가 IDR로 시작하지 않으면 브라우저 MSE append 실패 가능.
		hls_fragment    1.0;
		# 플레이리스트에 유지할 총 길이(초) — 지연 요청·404 완화
		hls_window      30;
		hls_cleanup     on;
		hls_dispose     1800;
		hls_wait_keyframe on;
		# DTS: on=SRS가 AAC 샘플로 DTS 추정(기본). floor와 함께 쓰면 세그먼트가 1초로 쪼개지는 현상이 있어 floor는 끔.
		hls_dts_directly on;
		hls_ts_floor off;
		hls_td_ratio    1.0;
		hls_aof_ratio   1.0;
    }

	play {
		mw_latency 0;
		gop_cache off;
		queue_length 10;
	}

    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8085/on_publish;
        on_unpublish    http://127.0.0.1:8085/on_unpublish;
    }
	rtc {
		enabled on;
		rtmp_to_rtc on;
		rtc_to_rtmp off;
	}
}

pid                 ./pids/srs.pid;

# dedicated vhost for publisher domain
vhost stream.kingofzeusfin.com {
	min_latency off;
	tcp_nodelay on;
	publish {
		mr off;
		# first packet timeout in ms (increase for slow encoders)
		firstpkt_timeout 600000;
		# normal packet timeout in ms (increase for network issues)
		normal_timeout 600000;
		# parse sps for video resolution info
		parse_sps on;
		# kickoff idle publisher when no players (0 = disabled)
		kickoff_for_idle 0;
	}
    hls {
        enabled on;
        hls_path /var/www/static/live/hls;
		hls_fragment 1.0;
		hls_window 30;
		hls_cleanup on;
		hls_dispose 1800;
		hls_wait_keyframe on;
		hls_dts_directly on;
		hls_ts_floor off;
		hls_td_ratio 1.0;
		hls_aof_ratio 1.0;
    }

	play {
		mw_latency 0;
		gop_cache off;
		queue_length 10;
	}

    http_hooks {
        enabled         on;
        on_publish      http://127.0.0.1:8085/on_publish;
        on_unpublish    http://127.0.0.1:8085/on_unpublish;
    }
	rtc {
		enabled on;
		rtmp_to_rtc on;
		rtc_to_rtmp off;
	}
}
