<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Live player (Embedded Testing)</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
        }
        iframe {
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body>
    <script>
        // 기존 player.html 파라미터(stream=table04_01)를 파싱합니다.
        const params = new URLSearchParams(window.location.search);
        const streamParam = params.get("stream") || "table01_01";
        const match = /^table(\d{2})_(\d{2})$/.exec(streamParam);
        
        let tableId = "01";
        let camId = "01";
        
        if (match) {
            tableId = match[1];
            camId = match[2];
        }

        // 임베디드 플레이어를 아이프레임으로 동일하게 호출합니다.
        const iframe = document.createElement("iframe");
        iframe.src = `/ll-player-embed.html?tableId=${tableId}&camId=${camId}`;
        iframe.allow = "autoplay; fullscreen";
        iframe.title = `Table ${tableId} Cam ${camId}`;
        
        document.body.appendChild(iframe);
    </script>
</body>
</html>
