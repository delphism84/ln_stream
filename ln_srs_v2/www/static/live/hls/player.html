<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Live player</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    #wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }
    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.72);
      color: #f3f4f6;
      font-size: 14px;
      text-align: center;
      z-index: 10;
      transition: opacity 0.35s ease;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #overlay.err { background: rgba(40, 10, 10, 0.88); }
    #spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlayTitle { font-weight: 600; font-size: 15px; }
    #overlayDetail {
      max-width: 42rem;
      font: 12px/1.5 ui-monospace, monospace;
      color: #9ca3af;
      word-break: break-all;
    }
    #btnRow { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
    button {
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
    }
    button:hover { background: rgba(255, 255, 255, 0.14); }
    #hud {
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 8px;
      z-index: 20;
      max-height: 30vh;
      overflow: auto;
      padding: 8px 10px;
      border-radius: 8px;
      font: 11px/1.45 ui-monospace, monospace;
      color: #e5e7eb;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      white-space: pre-wrap;
      word-break: break-all;
    }
    #hud.ok { border-color: rgba(34, 197, 94, 0.45); }
    #hud.warn { border-color: rgba(251, 191, 36, 0.4); }
    #hudToggle {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 25;
      font-size: 11px;
      padding: 6px 10px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <video id="v" playsinline controls muted autoplay></video>
    <div id="overlay">
      <div id="spinner"></div>
      <div id="overlayTitle">스트림 연결 중…</div>
      <div id="overlayDetail"></div>
      <div id="btnRow"></div>
    </div>
    <button type="button" id="hudToggle" aria-label="디버그 정보">HUD</button>
    <div id="hud" class="hud warn" hidden></div>
  </div>
  <script>
(function () {
  var params = new URLSearchParams(location.search);
  var streamParam = params.get("stream") || "table01_01";
  var m = /^table(\d{2})_(\d{2})$/.exec(streamParam);
  var streamKey = m ? "table" + m[1] + "_01" : "table01_01";

  var v = document.getElementById("v");
  var overlay = document.getElementById("overlay");
  var overlayTitle = document.getElementById("overlayTitle");
  var overlayDetail = document.getElementById("overlayDetail");
  var btnRow = document.getElementById("btnRow");
  var hud = document.getElementById("hud");
  var hudToggle = document.getElementById("hudToggle");

  var hlsInstance = null;
  var destroyed = false;
  var playingReported = false;
  var lastTick = 0;
  var lastProgressAt = Date.now();
  var reconnectTimer = null;
  var watchdogTimer = null;
  var bootStartedAt = Date.now();

  function m3u8Url(cacheBust) {
    var u = "/live/" + encodeURIComponent(streamKey) + ".m3u8";
    return cacheBust ? u + "?t=" + Date.now() : u;
  }

  function isAppleDevice() {
    var ua = navigator.userAgent || "";
    return /iPhone|iPad|iPod/i.test(ua) ||
      (/Macintosh/i.test(ua) && /WebKit/i.test(ua) && !/Chrome/i.test(ua));
  }

  function setOverlay(kind, title, detail, buttons) {
    overlay.classList.remove("hidden", "err");
    if (kind === "hide") {
      overlay.classList.add("hidden");
      return;
    }
    if (kind === "err") overlay.classList.add("err");
    overlayTitle.textContent = title || "";
    overlayDetail.textContent = detail || "";
    btnRow.innerHTML = "";
    (buttons || []).forEach(function (b) {
      var el = document.createElement("button");
      el.type = "button";
      el.textContent = b.label;
      el.addEventListener("click", b.onClick);
      btnRow.appendChild(el);
    });
  }

  function hudSet(level, text) {
    hud.className = "hud " + (level || "warn");
    hud.textContent = text;
  }

  function hudLine(extra) {
    var lines = [
      "req: " + streamParam,
      "use: " + streamKey,
      "url: " + m3u8Url(false),
      "path: " + (hlsInstance ? "hls.js" : (v.canPlayType("application/vnd.apple.mpegurl") ? "native" : "unknown")),
      "readyState: " + v.readyState,
      "networkState: " + v.networkState,
      "t: " + (isFinite(v.currentTime) ? v.currentTime.toFixed(2) : "—"),
      "paused: " + v.paused,
      "elapsed: " + ((Date.now() - bootStartedAt) / 1000).toFixed(1) + "s"
    ];
    if (extra) lines.push(extra);
    hudSet(playingReported ? "ok" : "warn", lines.join("\n"));
  }

  hudToggle.addEventListener("click", function () {
    hud.hidden = !hud.hidden;
    if (!hud.hidden) hudLine();
  });

  function destroyPlayer() {
    destroyed = true;
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    if (watchdogTimer) {
      clearInterval(watchdogTimer);
      watchdogTimer = null;
    }
    try {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }
    } catch (e) {}
    v.removeAttribute("src");
    v.load();
  }

  function tryPlay(reason) {
    v.muted = true;
    var p = v.play();
    if (p && typeof p.catch === "function") {
      p.catch(function (err) {
        setOverlay("load", "재생을 눌러 주세요", (err && err.message) || "autoplay blocked", [
          { label: "재생", onClick: function () { v.muted = true; v.play(); } }
        ]);
      });
    }
    if (!hud.hidden) hudLine(reason || "play()");
  }

  function onPlaying() {
    playingReported = true;
    lastProgressAt = Date.now();
    setOverlay("hide");
    if (!hud.hidden) hudLine("playing");
  }

  v.addEventListener("playing", onPlaying);
  v.addEventListener("timeupdate", function () {
    lastProgressAt = Date.now();
    lastTick = v.currentTime || 0;
  });
  v.addEventListener("waiting", function () {
    if (!hud.hidden) hudLine("buffering");
  });

  function scheduleReconnect(reason, delayMs) {
    if (destroyed) return;
    if (reconnectTimer) clearTimeout(reconnectTimer);
    reconnectTimer = setTimeout(function () {
      reconnectTimer = null;
      if (destroyed) return;
      boot();
    }, delayMs || 1200);
  }

  function attachNativeHls() {
    var url = m3u8Url(true);
    v.src = url;
    var oncePlay = function () {
      v.removeEventListener("loadeddata", oncePlay);
      tryPlay("native loadeddata");
    };
    v.addEventListener("loadeddata", oncePlay);
    v.addEventListener("error", function onErr() {
      v.removeEventListener("error", onErr);
      setOverlay("err", "네이티브 재생 오류", url, [
        { label: "다시 시도", onClick: function () { destroyed = false; boot(); } }
      ]);
    }, { once: true });
    v.load();
  }

  function attachHlsJs() {
    if (!window.Hls || !window.Hls.isSupported()) {
      if (v.canPlayType("application/vnd.apple.mpegurl")) {
        attachNativeHls();
        return;
      }
      setOverlay("err", "이 브라우저에서 HLS를 재생할 수 없습니다", navigator.userAgent, []);
      return;
    }

    var url = m3u8Url(true);
    hlsInstance = new window.Hls({
      enableWorker: true,
      lowLatencyMode: false,
      startLevel: -1,
      capLevelToPlayerSize: true,
      backBufferLength: 30,
      maxBufferLength: 24,
      maxMaxBufferLength: 48,
      liveSyncDurationCount: 4,
      liveMaxLatencyDurationCount: 12,
      manifestLoadingTimeOut: 20000,
      manifestLoadingMaxRetry: 6,
      manifestLoadingRetryDelay: 800,
      fragLoadingTimeOut: 20000,
      fragLoadingMaxRetry: 8,
      fragLoadingRetryDelay: 600
    });

    hlsInstance.on(window.Hls.Events.MANIFEST_PARSED, function () {
      tryPlay("manifest parsed");
    });

    hlsInstance.on(window.Hls.Events.ERROR, function (_e, data) {
      if (!data) return;
      var detail = data.details || "unknown";
      if (!hud.hidden) hudLine("hls err: " + detail + (data.fatal ? " (fatal)" : ""));
      if (!data.fatal) return;

      if (data.type === window.Hls.ErrorTypes.NETWORK_ERROR) {
        try {
          hlsInstance.startLoad();
        } catch (err) {
          scheduleReconnect("network", 1200);
        }
        return;
      }
      if (data.type === window.Hls.ErrorTypes.MEDIA_ERROR) {
        try {
          hlsInstance.recoverMediaError();
        } catch (err) {
          scheduleReconnect("media", 1000);
        }
        return;
      }
      setOverlay("err", "HLS 오류", detail + "\n" + url, [
        { label: "다시 시도", onClick: function () { destroyed = false; boot(); } }
      ]);
      scheduleReconnect("fatal", 2500);
    });

    hlsInstance.loadSource(url);
    hlsInstance.attachMedia(v);
  }

  function loadScriptSequential(urls, index, onOk, onFail) {
    if (index >= urls.length) {
      onFail();
      return;
    }
    var src = urls[index];
    var s = document.createElement("script");
    var done = false;
    var t = setTimeout(function () {
      if (done) return;
      done = true;
      s.remove();
      loadScriptSequential(urls, index + 1, onOk, onFail);
    }, 6000);
    s.async = true;
    s.src = src;
    s.onload = function () {
      if (done) return;
      done = true;
      clearTimeout(t);
      onOk();
    };
    s.onerror = function () {
      if (done) return;
      done = true;
      clearTimeout(t);
      s.remove();
      loadScriptSequential(urls, index + 1, onOk, onFail);
    };
    document.head.appendChild(s);
  }

  function checkManifestThen(next) {
    var url = m3u8Url(true);
    var ctrl = new AbortController();
    var to = setTimeout(function () {
      ctrl.abort();
    }, 15000);
    fetch(url, { method: "GET", cache: "no-store", signal: ctrl.signal })
      .then(function (res) {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.text();
      })
      .then(function (body) {
        if (!body || body.indexOf("#EXTM3U") !== 0) {
          throw new Error("invalid m3u8");
        }
        clearTimeout(to);
        next();
      })
      .catch(function (err) {
        clearTimeout(to);
        setOverlay("err", "스트림을 찾을 수 없습니다", url + "\n" + (err && err.message ? err.message : err), [
          { label: "새로고침", onClick: function () { location.reload(); } }
        ]);
      });
  }

  function boot() {
    destroyed = false;
    playingReported = false;
    bootStartedAt = Date.now();
    lastTick = 0;
    lastProgressAt = Date.now();
    destroyPlayer();
    destroyed = false;

    setOverlay("load", "스트림 연결 중…", m3u8Url(false));

    checkManifestThen(function () {
      var useNativeFirst = isAppleDevice() && v.canPlayType("application/vnd.apple.mpegurl");

      if (useNativeFirst) {
        attachNativeHls();
      } else {
        loadScriptSequential(
          ["/live/hls.min.js", "https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"],
          0,
          function () {
            if (destroyed) return;
            attachHlsJs();
          },
          function () {
            if (v.canPlayType("application/vnd.apple.mpegurl")) {
              attachNativeHls();
            } else {
              setOverlay("err", "hls.js 로드 실패", "로컬·CDN 모두 실패", [
                { label: "새로고침", onClick: function () { location.reload(); } }
              ]);
            }
          }
        );
      }

      watchdogTimer = setInterval(function () {
        if (destroyed) return;
        var ct = isFinite(v.currentTime) ? v.currentTime : 0;
        if (ct > lastTick + 0.04) {
          lastTick = ct;
          lastProgressAt = Date.now();
        }
        if (!playingReported && Date.now() - bootStartedAt > 25000) {
          setOverlay("err", "재생 시작 지연", "네트워크가 느리거나 스트림이 멈췄을 수 있습니다.\n" + m3u8Url(false), [
            { label: "다시 시도", onClick: function () { boot(); } },
            { label: "새로고침", onClick: function () { location.reload(); } }
          ]);
        }
        if (playingReported && Date.now() - lastProgressAt > 22000) {
          if (!hud.hidden) hudLine("stall → reconnect");
          scheduleReconnect("stall", 800);
        }
      }, 2000);
    });
  }

  document.addEventListener("visibilitychange", function () {
    if (document.visibilityState === "visible" && playingReported) {
      tryPlay("visible");
    }
  });

  boot();
})();
  </script>
</body>
</html>
