<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>썸네일 전체 보기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0c0c0c;
      color: #e5e5e5;
      padding: 1.25rem 1rem 2.5rem;
    }
    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      color: #fafafa;
    }
    .lead {
      font-size: 0.875rem;
      color: #a3a3a3;
      margin: 0 0 1rem;
      line-height: 1.5;
    }
    .lead code {
      font-size: 0.8rem;
      background: #1f1f1f;
      padding: 0.12rem 0.35rem;
      border-radius: 4px;
      color: #fde68a;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    button {
      cursor: pointer;
      border: 1px solid #404040;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 0.45rem 0.85rem;
      border-radius: 8px;
      font-size: 0.8125rem;
    }
    button:hover { background: #262626; }
    #summary {
      font-size: 0.8125rem;
      color: #737373;
      margin: 0;
    }
    details.urlbox {
      margin-bottom: 1.25rem;
      border: 1px solid #262626;
      border-radius: 10px;
      background: #141414;
      overflow: hidden;
    }
    details.urlbox summary {
      cursor: pointer;
      padding: 0.65rem 0.85rem;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #d4d4d4;
      list-style: none;
    }
    details.urlbox summary::-webkit-details-marker { display: none; }
    details.urlbox summary::after {
      content: " ▼";
      font-size: 0.7rem;
      color: #737373;
    }
    details.urlbox[open] summary::after { content: " ▲"; }
    .urlbox pre {
      margin: 0;
      padding: 0 0.85rem 0.85rem;
      font-size: 0.72rem;
      line-height: 1.45;
      color: #a3a3a3;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 220px;
      overflow: auto;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.85rem;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .card {
      background: #161616;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #262626;
    }
    .card__link {
      display: block;
      text-decoration: none;
      color: inherit;
    }
    .card__thumb {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #262626;
      display: block;
      vertical-align: middle;
    }
    .card__thumb[data-status="fail"] {
      min-height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      color: #737373;
    }
    .card__info {
      padding: 0.5rem 0.65rem;
      font-size: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .card__id { font-weight: 600; color: #f5f5f5; font-family: ui-monospace, monospace; font-size: 0.78rem; }
    .card__urls { font-size: 0.68rem; color: #737373; word-break: break-all; line-height: 1.35; }
    .card__status {
      font-size: 0.7rem;
      font-weight: 500;
    }
    .card__status.ok { color: #4ade80; }
    .card__status.fail { color: #f87171; }
    .card__status.pending { color: #a3a3a3; }
  </style>
</head>
<body>
  <h1>썸네일 전체 보기</h1>
  <p class="lead">
    개별 주소 형식: <code>{origin}/live/thumb/{스트림ID}.jpg</code><br>
    예: 스트림 <code>table04_01</code> → <code>/live/thumb/table04_01.jpg</code>
  </p>
  <details class="urlbox" open>
    <summary>썸네일 URL 목록 (복사용)</summary>
    <pre id="urlList">로딩 중…</pre>
  </details>
  <div class="toolbar">
    <button type="button" id="btnRefresh">이미지 다시 불러오기</button>
    <p id="summary"></p>
  </div>
  <ul class="grid" id="list"></ul>
  <script>
    var THUMB_BASE = location.origin + "/live/thumb";
    var PLAYER = location.origin + "/live/player.html";

    function pad2(n) {
      return (n < 10 ? "0" : "") + n;
    }

    /** thumb-list.json + table01_01 … table16_01 후보를 합쳐 중복 제거 */
    function buildIdList(jsonIds) {
      var set = {};
      function add(id) {
        if (id && typeof id === "string") set[id] = true;
      }
      if (Array.isArray(jsonIds)) jsonIds.forEach(add);
      for (var i = 1; i <= 16; i++) {
        add("table" + pad2(i) + "_01");
      }
      return Object.keys(set).sort();
    }

    function fullThumbUrl(id) {
      return THUMB_BASE + "/" + encodeURIComponent(id) + ".jpg";
    }

    function renderUrlPre(ids) {
      var lines = ids.map(function (id) {
        return fullThumbUrl(id);
      });
      document.getElementById("urlList").textContent = lines.join("\n");
    }

    function renderGrid(ids, bust) {
      var listEl = document.getElementById("list");
      var summaryEl = document.getElementById("summary");
      var q = bust ? "?t=" + Date.now() : "";
      var ok = 0;
      var fail = 0;

      summaryEl.textContent = "항목 " + ids.length + "개 점검 중…";
      listEl.innerHTML = "";

      ids.forEach(function (id) {
        var li = document.createElement("li");
        li.className = "card";

        var img = document.createElement("img");
        img.className = "card__thumb";
        img.alt = id;
        img.loading = "lazy";
        img.dataset.status = "pending";

        var statusEl = document.createElement("span");
        statusEl.className = "card__status pending";
        statusEl.textContent = "로딩…";

        img.onload = function () {
          img.dataset.status = "ok";
          statusEl.textContent = "OK";
          statusEl.className = "card__status ok";
          ok++;
          summaryEl.textContent = "항목 " + ids.length + "개 · OK " + ok + " · 실패 " + fail;
        };
        img.onerror = function () {
          img.dataset.status = "fail";
          img.alt = "없음: " + id;
          img.removeAttribute("src");
          statusEl.textContent = "FAIL";
          statusEl.className = "card__status fail";
          fail++;
          summaryEl.textContent = "항목 " + ids.length + "개 · OK " + ok + " · 실패 " + fail;
        };

        img.src = fullThumbUrl(id) + q;

        var info = document.createElement("div");
        info.className = "card__info";

        var idEl = document.createElement("div");
        idEl.className = "card__id";
        idEl.textContent = id;

        var urlLine = document.createElement("div");
        urlLine.className = "card__urls";
        urlLine.textContent = fullThumbUrl(id);

        var playA = document.createElement("a");
        playA.href = PLAYER + "?stream=" + encodeURIComponent(id);
        playA.className = "card__link";
        playA.textContent = "▶ 플레이어 열기";
        playA.style.fontSize = "0.72rem";
        playA.style.color = "#38bdf8";
        playA.style.marginTop = "0.15rem";

        info.appendChild(idEl);
        info.appendChild(urlLine);
        info.appendChild(statusEl);
        info.appendChild(playA);

        var wrap = document.createElement("a");
        wrap.className = "card__link";
        wrap.href = fullThumbUrl(id);
        wrap.target = "_blank";
        wrap.rel = "noopener";
        wrap.appendChild(img);

        li.appendChild(wrap);
        li.appendChild(info);
        listEl.appendChild(li);
      });
    }

    var lastIds = [];

    function run(bust) {
      fetch(THUMB_BASE + "/thumb-list.json?t=" + Date.now(), { cache: "no-store" })
        .then(function (r) {
          return r.ok ? r.json() : [];
        })
        .catch(function () {
          return [];
        })
        .then(function (arr) {
          lastIds = buildIdList(arr);
          renderUrlPre(lastIds);
          renderGrid(lastIds, bust);
        });
    }

    document.getElementById("btnRefresh").addEventListener("click", function () {
      run(true);
    });

    run(false);
  </script>
</body>
</html>
